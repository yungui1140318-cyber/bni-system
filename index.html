<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雲貴人脈系統 (Ver 20260422-產業鏈戰略版)</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #cf2e2e; --bg-color: #f0f2f5; --text-color: #333; --partner-bg: #e9ecef; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg-color); height: 100vh; display: flex; flex-direction: column; color: var(--text-color); overflow: hidden; }

        /* Login Overlay */
        #identity-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .box { background: white; padding: 30px; border-radius: 12px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .box input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; text-align: center; outline: none; }
        .box button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Layout */
        header { background: var(--primary-color); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-shrink: 0; }
        header h1 { margin: 0; font-size: 1.1rem; }
        .user-tag { font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .tabs-container { background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; flex-shrink: 0; }
        .tabs { display: flex; background: #f0f0f0; border-radius: 50px; padding: 5px; max-width: 800px; margin: 0 auto; overflow-x: auto; white-space: nowrap; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; border-radius: 40px; cursor: pointer; font-weight: bold; color: #666; font-size: 0.9rem; min-width: 80px; }
        .tab-btn.active { background: var(--primary-color); color: white; }
        .tab-btn-admin { display: none; color: #d32f2f; }

        .container { padding: 15px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; display: none; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
        .container.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* TOP 10 Ranking UI */
        .ranking-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; border-top: 4px solid #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ranking-title { font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .ranking-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .rank-item { background: #f8f9fa; border: 1px solid #eee; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; }
        .rank-number { background: #333; color: white; width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; margin-right: 6px; }

        /* Member Wall */
        .member-list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .member-chip { background: white; padding: 8px; text-align: center; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; font-size: 0.85rem; font-weight: bold; transition: all 0.2s; }
        .member-chip:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .member-chip.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* Mandala Grid */
        .mandala { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding-bottom: 20px; }
        .sub-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #fff; border: 1px solid #ccc; aspect-ratio: 1/1; }
        .cell { border: 1px solid #eee; display: flex; align-items: center; justify-content: center; position: relative; background: #fff; overflow: hidden; font-size: 0.85rem; text-align: center; padding: 2px; box-sizing: border-box; cursor: pointer; }
        .cell.master { background: var(--primary-color); color: white; font-weight: bold; }
        .cell.core { background: #f5f5f5; font-weight: bold; }
        
        /* Readonly mode (Wall) */
        .wall-mode .cell { cursor: default; }
        .wall-mode .sub-grid:nth-child(5) { border: 2px solid #666; }

        /* CRM & Tables */
        .std-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; background: white; border-radius: 8px; overflow: hidden; }
        .std-table th { background: #333; color: white; padding: 12px; text-align: left; }
        .std-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .tag { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .tag-pink { background: #fce4ec; color: #c2185b; }
        .tag-blue { background: #e3f2fd; color: #1565c0; }
        .tag-yellow { background: #fff9c4; color: #fbc02d; }
        .tag-green { background: #e8f5e9; color: #2e7d32; }

        /* Search Suggestion UI */
        .search-container { position: relative; margin-bottom: 15px; }
        .search-input { width: 100%; padding: 12px; border: 2px solid var(--primary-color); border-radius: 8px; box-sizing: border-box; outline: none; }
        .search-results { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; z-index: 1000; max-height: 150px; overflow-y: auto; display: none; }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .search-item:hover { background: #f0f2f5; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center; }
        .modal { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }

        #loading { position: fixed; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: white; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; display: none; z-index: 20000; }
    </style>
</head>
<body>

<script>
    const SUPABASE_URL = 'https://htlywcaudjfnneaoikgz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0bHl3Y2F1ZGpmbm5lYW9pa2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3MjExOTIsImV4cCI6MjA4NjI5NzE5Mn0.h5lO8qbOBaQD1vqNwyFmLAGjut6afZN4mDrgmPoxCUg';
</script>

<div id="loading">處理中...</div>

<div id="identity-overlay">
    <div class="box">
        <h2>雲貴人脈系統</h2>
        <p>請登入系統</p>
        <input type="text" id="loginName" placeholder="帳號 / 姓名">
        <input type="password" id="loginPwd" placeholder="密碼" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">登入</button>
    </div>
</div>

<header>
    <h1>雲貴人脈庫</h1>
    <span class="user-tag" id="displayUser" onclick="logout()">登出</span>
</header>

<div class="tabs-container">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('wall')">產業鏈牆</div>
        <div class="tab-btn" onclick="switchTab('grid')">我的 81 宮格</div>
        <div class="tab-btn" onclick="switchTab('matches')">🤝 資源媒合</div>
        <div class="tab-btn" onclick="switchTab('crm')">人脈變現表</div>
        <div class="tab-btn tab-btn-admin" id="adminTabBtn" onclick="switchTab('admin')">⚙️ 後台</div>
    </div>
</div>

<div id="wall-view" class="container active">
    <div class="ranking-card">
        <div class="ranking-title">🔥 雲貴分會最缺人脈 TOP 10</div>
        <div id="top-ranking" class="ranking-list">載入中...</div>
    </div>
    <div class="member-list-grid" id="member-wall-chips"></div>
    <div id="wall-mandala-container" class="wall-mode">
        <div style="text-align:center; padding:40px; color:#999; border:2px dashed #ccc; border-radius:8px;">
            請點擊上方夥伴名字來查看其產業鏈需求
        </div>
    </div>
</div>

<div id="grid-view" class="container">
    <div id="mandala" class="mandala"></div>
</div>

<div id="matches-view" class="container">
    <div id="match-results"></div>
</div>

<div id="crm-view" class="container">
    <div class="crm-form">
        <div class="search-container">
            <input type="text" class="search-input" id="crmSearch" placeholder="🔍 全域搜尋產業..." oninput="handleGlobalSearch(this, 'crm')">
            <div id="crmSearchResults" class="search-results"></div>
        </div>
        <div class="row">
            <input id="cName" placeholder="人脈姓名">
        </div>
        <div class="row">
            <select id="cCategory" onchange="onCRMCatChange()"></select>
            <select id="cIndustry"></select>
        </div>
        <div class="row">
            <select id="cTrust">
                <option value="A">A.極熟悉信任</option><option value="B">B.交情不錯</option><option value="C">C.不熟</option><option value="D">D.陌生</option>
            </select>
            <select id="cNeed">
                <option value="X">X-需求極高</option><option value="Y">Y-一般需求</option><option value="Z">Z-不了解</option>
            </select>
        </div>
        <button class="btn-main" onclick="addContact()">新增人脈資源</button>
    </div>
    <div style="overflow-x:auto"><table class="std-table"><thead><tr><th>策略</th><th>姓名/產業</th><th>面談</th><th>✕</th></tr></thead><tbody id="contact-list"></tbody></table></div>
</div>

<div id="admin-view" class="container">
    <div class="admin-panel"><h3>👥 會員管理</h3><table class="std-table"><thead><tr><th>姓名</th><th>角色</th></tr></thead><tbody id="member-list"></tbody></table></div>
</div>

<div class="modal-overlay" id="gridEditModal">
    <div class="modal">
        <h3>✏️ 編輯產業宮格</h3>
        <div class="search-container">
            <input type="text" class="search-input" id="gridSearch" placeholder="🔍 快速搜尋產業..." oninput="handleGlobalSearch(this, 'grid')">
            <div id="gridSearchResults" class="search-results"></div>
        </div>
        <div style="margin-bottom:15px;"><label>引薦圈：</label><select id="gridEditCat" style="width:100%;" onchange="onGridEditCatChange()"></select></div>
        <div style="margin-bottom:15px;"><label>細項：</label><select id="gridEditInd" style="width:100%;"></select></div>
        <div style="text-align:right;"><button onclick="closeGridEditModal()">取消</button><button style="background:var(--primary-color);color:white;" onclick="saveGridEdit()">確認</button></div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentMember = null;
    let industryMap = {};
    let gridData = {}; 
    let myContacts = [];
    let currentEditingGridId = null;

    // --- 登入系統 ---
    async function login() {
        const name = document.getElementById('loginName').value.trim();
        const pwd = document.getElementById('loginPwd').value.trim();
        document.getElementById('loading').style.display = 'block';
        const { data, error } = await db.from('members').select('*').eq('name', name).eq('password', pwd).single();
        if (error || !data) { document.getElementById('loading').style.display = 'none'; return alert("登入失敗"); }
        currentMember = data;
        document.getElementById('displayUser').innerText = `${data.name} (登出)`;
        document.getElementById('identity-overlay').style.display = 'none';
        if (data.role === 'admin') document.getElementById('adminTabBtn').style.display = 'inline-block';
        await initSystem();
        document.getElementById('loading').style.display = 'none';
    }
    function logout() { location.reload(); }

    async function initSystem() {
        await loadIndustries();
        renderGridStructure('mandala', true); // 我的宮格
        await loadGrid();
        await loadContacts();
        await loadMemberWall(); // 初始化牆
    }

    async function loadIndustries() {
        const { data } = await db.from('industries').select('*').order('category');
        industryMap = {};
        if (data) data.forEach(i => { if(!industryMap[i.category]) industryMap[i.category]=[]; industryMap[i.category].push(i.name); });
        const cats = Object.keys(industryMap);
        let html = '<option value="" disabled selected>選擇引薦圈</option>';
        cats.forEach(c => html += `<option value="${c}">${c}</option>`);
        document.getElementById('cCategory').innerHTML = html;
        document.getElementById('gridEditCat').innerHTML = html;
    }

    // --- 產業鏈牆 & TOP 10 邏輯 ---
    async function loadMemberWall() {
        // 1. 抓取所有格子的數據來統計排行榜
        const { data: allGrids } = await db.from('user_grids').select('content, grid_index');
        const counts = {};
        allGrids.forEach(g => {
            if (g.content && g.grid_index !== 'g4-c4' && !g.grid_index.includes('c4')) { // 排除中心與連動格
                counts[g.content] = (counts[g.content] || 0) + 1;
            }
        });
        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 10);
        document.getElementById('top-ranking').innerHTML = sorted.map((s, idx) => `
            <div class="rank-item"><span class="rank-number">${idx+1}</span>${s[0]} (${s[1]}人找)</div>
        `).join('') || '尚無數據';

        // 2. 抓取所有會員名單
        const { data: members } = await db.from('members').select('id, name').order('name');
        document.getElementById('member-wall-chips').innerHTML = members.map(m => `
            <div class="member-chip" id="chip-${m.id}" onclick="viewPartnerGrid('${m.id}', '${m.name}')">${m.name}</div>
        `).join('');
    }

    async function viewPartnerGrid(id, name) {
        document.querySelectorAll('.member-chip').forEach(c => c.classList.remove('active'));
        document.getElementById(`chip-${id}`).classList.add('active');
        
        const container = document.getElementById('wall-mandala-container');
        container.innerHTML = `<h4 style="margin:0 0 10px 0; text-align:center;">${name} 的產業鏈需求</h4><div id="wall-mandala" class="mandala"></div>`;
        renderGridStructure('wall-mandala', false);
        
        const { data } = await db.from('user_grids').select('*').eq('member_id', id);
        if (data) data.forEach(item => {
            const cell = container.querySelector(`#wall-mandala-cell-${item.grid_index}`);
            if (cell) cell.innerText = item.content;
        });
    }

    // --- 宮格通用結構 ---
    function renderGridStructure(containerId, isEditable) {
        const el = document.getElementById(containerId);
        el.innerHTML = '';
        const map = { 0:0, 1:1, 2:2, 3:3, 5:5, 6:6, 7:7, 8:8 };
        for(let g=0; g<9; g++) {
            let sub = document.createElement('div'); sub.className='sub-grid';
            for(let c=0; c<9; c++) {
                let cell = document.createElement('div');
                let id = `g${g}-c${c}`;
                cell.className = `cell ${g===4&&c===4?'master':''} ${c===4?'core':''}`;
                cell.id = `${containerId}-cell-${id}`;
                if (isEditable) {
                    if (id.includes('c4') && id !== 'g4-c4') {
                        cell.style.cursor = 'default';
                    } else {
                        cell.onclick = () => openGridEditModal(id);
                    }
                }
                sub.appendChild(cell);
            }
            el.appendChild(sub);
        }
    }

    // --- 核心宮格存取 ---
    async function loadGrid() {
        const { data } = await db.from('user_grids').select('*').eq('member_id', currentMember.id);
        gridData = {};
        if (data) data.forEach(item => {
            gridData[item.grid_index] = item.content;
            const cell = document.getElementById(`mandala-cell-${item.grid_index}`);
            if (cell) cell.innerText = item.content;
        });
    }

    function openGridEditModal(id) {
        currentEditingGridId = id;
        document.getElementById('gridSearch').value = '';
        document.getElementById('gridSearchResults').style.display = 'none';
        document.getElementById('gridEditModal').style.display = 'flex';
    }
    function closeGridEditModal() { document.getElementById('gridEditModal').style.display = 'none'; }

    async function saveGridEdit() {
        const val = document.getElementById('gridEditInd').value;
        if (!val) return;
        document.getElementById('loading').style.display = 'block';
        await db.from('user_grids').upsert({ member_id: currentMember.id, grid_index: currentEditingGridId, content: val }, { onConflict: 'member_id, grid_index' });
        if (currentEditingGridId.startsWith('g4-') && currentEditingGridId !== 'g4-c4') {
            const col = currentEditingGridId.split('-c')[1];
            const map = { 0:0, 1:1, 2:2, 3:3, 5:5, 6:6, 7:7, 8:8 };
            await db.from('user_grids').upsert({ member_id: currentMember.id, grid_index: `g${map[col]}-c4`, content: val }, { onConflict: 'member_id, grid_index' });
        }
        await loadGrid();
        closeGridEditModal();
        document.getElementById('loading').style.display = 'none';
    }

    // --- 全域搜尋 ---
    function handleGlobalSearch(inputEl, mode) {
        const term = inputEl.value.trim().toLowerCase();
        const resDiv = mode === 'grid' ? document.getElementById('gridSearchResults') : document.getElementById('crmSearchResults');
        if (!term) { resDiv.style.display = 'none'; return; }
        let matches = [];
        for (let cat in industryMap) { industryMap[cat].forEach(ind => { if(ind.toLowerCase().includes(term)) matches.push({cat, ind}); }); }
        resDiv.innerHTML = matches.map(m => `<div class="search-item" onclick="selectSearchMatch('${m.cat}', '${m.ind}', '${mode}')">${m.ind} <small>(${m.cat})</small></div>`).join('');
        resDiv.style.display = 'block';
    }
    function selectSearchMatch(cat, ind, mode) {
        const catId = mode === 'grid' ? 'gridEditCat' : 'cCategory';
        const indId = mode === 'grid' ? 'gridEditInd' : 'cIndustry';
        document.getElementById(catId).value = cat;
        if (mode === 'grid') onGridEditCatChange(); else onCRMCatChange();
        document.getElementById(indId).value = ind;
        document.querySelectorAll('.search-results').forEach(r => r.style.display = 'none');
    }

    function onCRMCatChange() {
        const cat = document.getElementById('cCategory').value;
        let html = '<option value="" disabled selected>選擇細項</option>';
        if(industryMap[cat]) industryMap[cat].forEach(i => html += `<option value="${i}">${i}</option>`);
        document.getElementById('cIndustry').innerHTML = html;
    }
    function onGridEditCatChange() {
        const cat = document.getElementById('gridEditCat').value;
        let html = '<option value="" disabled selected>選擇細項</option>';
        if(industryMap[cat]) industryMap[cat].forEach(i => html += `<option value="${i}">${i}</option>`);
        document.getElementById('gridEditInd').innerHTML = html;
    }

    // --- 其他功能 (資源媒合/CRM) 保持不變 ---
    async function loadContacts() {
        const { data } = await db.from('user_contacts').select('*').eq('member_id', currentMember.id).order('created_at', { ascending: false });
        const list = document.getElementById('contact-list');
        list.innerHTML = (data || []).map(c => {
            const s = getStrategy(c.trust_level, c.need_level);
            return `<tr><td><span class="tag ${s.class}">${s.text}</span></td><td><b>${c.name}</b><br>${c.industry}</td><td>-</td><td>✕</td></tr>`;
        }).join('');
    }
    function getStrategy(t, n) {
        if ((t==='A'||t==='B')&&(n==='X'||n==='Y')) return {text:'🔥 甜蜜區', class:'tag-pink'};
        return {text:'🌱 觀察中', class:'tag-green'};
    }
    async function addContact() {
        const n = document.getElementById('cName').value;
        const i = document.getElementById('cIndustry').value;
        if(!n || !i) return;
        await db.from('user_contacts').insert({ member_id: currentMember.id, owner_name: currentMember.name, name: n, industry: i, trust_level: document.getElementById('cTrust').value, need_level: document.getElementById('cNeed').value, logs:[] });
        document.getElementById('cName').value = ''; await loadContacts();
    }

    function switchTab(t) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`${t}-view`).classList.add('active');
        event.currentTarget.classList.add('active');
        if (t === 'wall') loadMemberWall();
        if (t === 'matches') loadMatches();
    }

    async function loadMatches() {
        const needs = Object.values(gridData);
        const resDiv = document.getElementById('match-results');
        if(needs.length===0) { resDiv.innerHTML = '請先填寫宮格需求'; return; }
        const { data } = await db.from('user_contacts').select('*').neq('member_id', currentMember.id).in('industry', needs);
        resDiv.innerHTML = (data || []).map(m => `<div style="background:white; padding:15px; margin-bottom:10px; border-radius:8px;"><b>${m.name}</b> (${m.industry})<br>提供者: ${m.owner_name}</div>`).join('') || '無匹配';
    }
</script>
</body>
</html>
