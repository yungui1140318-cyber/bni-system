<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雲貴人脈系統 (Ver 20260423-穩健搜尋版)</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #cf2e2e; --bg-color: #f0f2f5; --text-color: #333; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg-color); height: 100vh; display: flex; flex-direction: column; color: var(--text-color); overflow: hidden; }

        /* Login Overlay */
        #identity-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .box { background: white; padding: 30px; border-radius: 12px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .box h2 { margin-top: 0; color: #333; }
        .box input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 1rem; box-sizing: border-box; outline: none; }
        .box button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        header { background: var(--primary-color); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-shrink: 0; }
        header h1 { margin: 0; font-size: 1.1rem; }
        .user-tag { font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .tabs-container { background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; flex-shrink: 0; }
        .tabs { display: flex; background: #f0f0f0; border-radius: 50px; padding: 5px; max-width: 800px; margin: 0 auto; overflow-x: auto; white-space: nowrap; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; border-radius: 40px; cursor: pointer; font-weight: bold; color: #666; font-size: 0.95rem; min-width: 80px; display: inline-block; }
        .tab-btn.active { background: var(--primary-color); color: white; }
        .tab-btn-admin { display: none; color: #d32f2f; } 
        .tab-btn-admin.active { background: #333; color: white; }

        .container { padding: 15px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; display: none; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
        .container.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid */
        .mandala { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding-bottom: 20px; }
        .sub-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #fff; border: 1px solid #ccc; aspect-ratio: 1/1; }
        .sub-grid:nth-child(5) { border: 2px solid var(--primary-color); box-shadow: 0 0 15px rgba(207, 46, 46, 0.15); z-index: 5; position: relative; }
        .cell { border: 1px solid #eee; display: flex; align-items: center; justify-content: center; position: relative; background: #fff; overflow: hidden; }
        
        .grid-select { 
            width: 100%; height: 100%; border: none; outline: none; background: transparent; 
            text-align: center; display: flex; align-items: center; justify-content: center; 
            font-size: 0.85rem; cursor: pointer; padding: 4px; box-sizing: border-box;
            word-break: break-all;
        }
        .core .grid-select { background: #f5f5f5; font-weight: bold; color: #444; }
        .master .grid-select { background: var(--primary-color); color: white; font-weight: bold; font-size: 0.95rem; }

        /* CRM Form */
        .crm-form { background: white; padding: 15px; border-radius: 8px; border-top: 4px solid var(--primary-color); margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        input, select { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; min-width: 120px; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        /* Search Module CSS */
        .search-container { position: relative; width: 100%; margin-bottom: 10px; }
        .search-input { width: 100%; padding: 12px; border: 2px solid var(--primary-color); border-radius: 8px; box-sizing: border-box; outline: none; }
        .search-results { 
            position: absolute; top: 100%; left: 0; width: 100%; background: white; 
            border: 1px solid #ccc; z-index: 1000; max-height: 150px; overflow-y: auto; display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 0 0 8px 8px;
        }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .search-item:hover { background: #f0f2f5; }

        /* Admin Table */
        .std-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; background: white; border-radius: 8px; overflow: hidden; }
        .std-table th { background: #333; color: white; padding: 12px; text-align: left; }
        .std-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn-sm { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.8rem; }
        .btn-del { background: #f44336; color: white; }
        .tag { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .tag-pink { background: #fce4ec; color: #c2185b; }
    </style>
</head>
<body>

<div id="loading" style="position:fixed; top:15px; right:15px; background:rgba(0,0,0,0.8); color:white; padding:6px 15px; border-radius:20px; display:none; z-index:20000;">處理中...</div>

<div id="identity-overlay">
    <div class="box">
        <h2>雲貴人脈系統</h2>
        <input type="text" id="loginName" placeholder="帳號 / 姓名">
        <input type="password" id="loginPwd" placeholder="密碼">
        <button onclick="login()">登入</button>
    </div>
</div>

<header>
    <h1>雲貴人脈庫</h1>
    <span class="user-tag" id="displayUser" onclick="logout()">登出</span>
</header>

<div class="tabs-container">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('grid')">產業鏈 81 宮格</div>
        <div class="tab-btn" onclick="switchTab('matches')">🤝 資源媒合</div>
        <div class="tab-btn" onclick="switchTab('crm')">人脈變現表</div>
        <div class="tab-btn tab-btn-admin" id="adminTabBtn" onclick="switchTab('admin')">⚙️ 後台</div>
    </div>
</div>

<div id="grid-view" class="container active"><div id="mandala" class="mandala"></div></div>
<div id="matches-view" class="container"><div id="match-results"></div></div>

<div id="crm-view" class="container">
    <div class="crm-form">
        <div class="search-container">
            <input type="text" class="search-input" id="crmSearch" placeholder="🔍 全域搜尋產業關鍵字..." oninput="handleGlobalSearch(this, 'crm')">
            <div id="crmSearchResults" class="search-results"></div>
        </div>
        <div class="row"><input id="cName" placeholder="人脈姓名"></div>
        <div class="row" style="background:#f8f9fa; padding:10px; border-radius:6px;">
            <select id="cCategory" onchange="onCRMCatChange()"></select>
            <select id="cIndustry"></select>
        </div>
        <div class="row">
            <select id="cTrust"><option value="A">A.極熟悉</option><option value="B">B.不錯</option><option value="C">C.不熟</option><option value="D">D.陌生</option></select>
            <select id="cNeed"><option value="X">X-急需</option><option value="Y">Y-有需求</option><option value="Z">Z-不了解</option></select>
        </div>
        <button class="btn-main" onclick="addContact()">新增人脈資源</button>
    </div>
    <div style="overflow-x:auto"><table class="std-table"><thead><tr><th>策略</th><th>姓名/產業</th><th>✕</th></tr></thead><tbody id="contact-list"></tbody></table></div>
</div>

<div id="admin-view" class="container">
    <div style="background:white; padding:15px; border-radius:8px; margin-bottom:20px;">
        <h3>👥 人員管理中心</h3>
        <table class="std-table"><thead><tr><th>姓名</th><th>狀態</th><th>操作</th></tr></thead><tbody id="member-list"></tbody></table>
    </div>
    <div style="background:white; padding:15px; border-radius:8px;">
        <h3>🏷️ 產業分類管理</h3>
        <table class="std-table"><thead><tr><th>大分類</th><th>細項</th><th>操作</th></tr></thead><tbody id="admin-industry-list"></tbody></table>
    </div>
</div>

<div class="modal-overlay" id="gridEditModal">
    <div class="modal" style="background:white; padding:20px; border-radius:8px; width:90%; max-width:350px;">
        <h3>✏️ 編輯產業宮格</h3>
        <div class="search-container">
            <input type="text" class="search-input" id="gridSearch" placeholder="🔍 快速搜尋產業..." oninput="handleGlobalSearch(this, 'grid')">
            <div id="gridSearchResults" class="search-results"></div>
        </div>
        <div style="margin-bottom:10px;"><label>戰略引薦圈：</label><select id="gridEditCat" onchange="onGridEditCatChange()" style="width:100%; padding:10px;"></select></div>
        <div style="margin-bottom:15px;"><label>細項：</label><select id="gridEditInd" style="width:100%; padding:10px;"></select></div>
        <div style="text-align:right;"><button onclick="closeGridEditModal()">取消</button> <button onclick="saveGridEdit()" style="background:var(--primary-color); color:white; padding:8px 15px; border:none; border-radius:4px;">儲存</button></div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentMember = null, industryMap = {}, gridData = {}, currentEditingGridId = null;

    async function login() {
        const n = document.getElementById('loginName').value.trim(), p = document.getElementById('loginPwd').value.trim();
        document.getElementById('loading').style.display = 'block';
        const { data: member, error } = await db.from('members').select('*').eq('name', n).eq('password', p).single();
        if (error || !member) { document.getElementById('loading').style.display = 'none'; return alert("錯誤"); }
        
        currentMember = member; // 這裡絕對不能漏
        document.getElementById('displayUser').innerText = `${member.name} (登出)`;
        document.getElementById('identity-overlay').style.display = 'none';
        if(member.role === 'admin') document.getElementById('adminTabBtn').style.display = 'inline-block';

        renderGridStructure();
        await loadIndustries();
        await loadGrid();
        await loadContacts();
        document.getElementById('loading').style.display = 'none';
    }
    function logout() { location.reload(); }

    async function loadIndustries() {
        const { data } = await db.from('industries').select('*').order('category');
        industryMap = {};
        if (data) data.forEach(i => { if(!industryMap[i.category]) industryMap[i.category]=[]; industryMap[i.category].push(i.name); });
        const cats = Object.keys(industryMap);
        let html = '<option value="" disabled selected>選擇分類</option>';
        cats.forEach(c => html += `<option value="${c}">${c}</option>`);
        document.getElementById('cCategory').innerHTML = html;
        document.getElementById('gridEditCat').innerHTML = html;
    }

    function onCRMCatChange() {
        const cat = document.getElementById('cCategory').value;
        const sub = document.getElementById('cIndustry');
        let html = '<option value="" disabled selected>選擇細項</option>';
        if (industryMap[cat]) industryMap[cat].forEach(i => html += `<option value="${i}">${i}</option>`);
        sub.innerHTML = html;
    }
    function onGridEditCatChange() {
        const cat = document.getElementById('gridEditCat').value;
        const sub = document.getElementById('gridEditInd');
        let html = '<option value="" disabled selected>選擇細項</option>';
        if (industryMap[cat]) industryMap[cat].forEach(i => html += `<option value="${i}">${i}</option>`);
        sub.innerHTML = html;
    }

    // --- 全域搜尋核心邏輯 (修復後台失效的關鍵在於不污染全域變數) ---
    function handleGlobalSearch(inputEl, mode) {
        const term = inputEl.value.trim().toLowerCase();
        const resultsDiv = document.getElementById(mode === 'grid' ? 'gridSearchResults' : 'crmSearchResults');
        if (!term) { resultsDiv.style.display = 'none'; return; }

        let matches = [];
        for (let cat in industryMap) {
            industryMap[cat].forEach(ind => {
                if (ind.toLowerCase().includes(term) || cat.toLowerCase().includes(term)) {
                    matches.push({ cat, ind });
                }
            });
        }
        if (matches.length > 0) {
            resultsDiv.innerHTML = matches.map(m => `<div class="search-item" onclick="selectSearchMatch('${m.cat}', '${m.ind}', '${mode}')">${m.ind} <small>(${m.cat})</small></div>`).join('');
            resultsDiv.style.display = 'block';
        } else {
            resultsDiv.style.display = 'none';
        }
    }

    function selectSearchMatch(cat, ind, mode) {
        const catEl = document.getElementById(mode === 'grid' ? 'gridEditCat' : 'cCategory');
        const indEl = document.getElementById(mode === 'grid' ? 'gridEditInd' : 'cIndustry');
        catEl.value = cat;
        if (mode === 'grid') onGridEditCatChange(); else onCRMCatChange();
        indEl.value = ind;
        document.querySelectorAll('.search-results').forEach(d => d.style.display = 'none');
    }

    // --- 核心宮格與 CRM (恢復穩定版邏輯) ---
    function renderGridStructure() {
        const el = document.getElementById('mandala'); el.innerHTML = '';
        for(let g=0; g<9; g++) {
            let sub = document.createElement('div'); sub.className='sub-grid';
            for(let c=0; c<9; c++) {
                let cell = document.createElement('div'); let id = `g${g}-c${c}`;
                cell.className = `cell ${g===4&&c===4?'master':''} ${c===4?'core':''}`;
                cell.innerHTML = `<div class="grid-select" id="cell-${id}" onclick="openGridEditModal('${id}')"></div>`;
                sub.appendChild(cell);
            }
            el.appendChild(sub);
        }
    }
    async function loadGrid() {
        const { data } = await db.from('user_grids').select('*').eq('member_id', currentMember.id);
        if (data) data.forEach(item => { gridData[item.grid_index] = item.content; const cell = document.getElementById(`cell-${item.grid_index}`); if (cell) cell.innerText = item.content; });
    }
    function openGridEditModal(id) { if (id.includes('c4') && id !== 'g4-c4') return; currentEditingGridId = id; document.getElementById('gridEditModal').style.display = 'flex'; }
    function closeGridEditModal() { document.getElementById('gridEditModal').style.display = 'none'; }
    async function saveGridEdit() {
        const val = document.getElementById('gridEditInd').value; if (!val) return;
        await db.from('user_grids').upsert({ member_id: currentMember.id, grid_index: currentEditingGridId, content: val }, { onConflict: 'member_id, grid_index' });
        if (currentEditingGridId.startsWith('g4-') && currentEditingGridId !== 'g4-c4') {
            const col = currentEditingGridId.split('-c')[1]; const map = { 0:0, 1:1, 2:2, 3:3, 5:5, 6:6, 7:7, 8:8 };
            await db.from('user_grids').upsert({ member_id: currentMember.id, grid_index: `g${map[col]}-c4`, content: val }, { onConflict: 'member_id, grid_index' });
        }
        await loadGrid(); closeGridEditModal();
    }

    async function loadContacts() {
        const { data } = await db.from('user_contacts').select('*').eq('member_id', currentMember.id).order('created_at', { ascending: false });
        const list = document.getElementById('contact-list');
        list.innerHTML = (data || []).map(c => `<tr><td><span class="tag tag-pink">甜蜜區</span></td><td><b>${c.name}</b><br>${c.industry}</td><td><button onclick="delContact('${c.id}')">✕</button></td></tr>`).join('');
    }
    async function addContact() {
        const n = document.getElementById('cName').value, i = document.getElementById('cIndustry').value;
        if(!n || !i) return alert("請填寫姓名與產業");
        await db.from('user_contacts').insert({ member_id: currentMember.id, owner_name: currentMember.name, name: n, industry: i, trust_level: document.getElementById('cTrust').value, need_level: document.getElementById('cNeed').value });
        document.getElementById('cName').value = ''; await loadContacts();
    }
    async function delContact(id) { if(!confirm("確定？")) return; await db.from('user_contacts').delete().eq('id', id); await loadContacts(); }

    // --- 後台管理 (完整恢復穩定版功能) ---
    async function switchTab(t) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`${t}-view`).classList.add('active');
        if (t === 'admin') loadAdminData();
    }

    async function loadAdminData() {
        if(currentMember.role !== 'admin') return;
        const { data: mems } = await db.from('members').select('*').order('name');
        document.getElementById('member-list').innerHTML = mems.map(m => `<tr><td>${m.name}</td><td>${m.role}</td><td><button class="btn-sm btn-del" onclick="deleteMember('${m.id}')">刪除</button></td></tr>`).join('');
        const { data: inds } = await db.from('industries').select('*').order('category');
        document.getElementById('admin-industry-list').innerHTML = inds.map(i => `<tr><td>${i.category}</td><td>${i.name}</td><td><button class="btn-sm btn-del" onclick="deleteIndustry('${i.id}')">刪除</button></td></tr>`).join('');
    }
    async function deleteMember(id) { if(!confirm("刪除會員？")) return; await db.from('members').delete().eq('id', id); loadAdminData(); }
    async function deleteIndustry(id) { if(!confirm("刪除產業？")) return; await db.from('industries').delete().eq('id', id); loadAdminData(); loadIndustries(); }
</script>
</body>
</html>
