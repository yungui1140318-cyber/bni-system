<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雲貴人脈系統 (Ver 20260422-大家要的搜尋版)</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #cf2e2e; --bg-color: #f0f2f5; --text-color: #333; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg-color); height: 100vh; display: flex; flex-direction: column; color: var(--text-color); overflow: hidden; }

        /* Login Overlay */
        #identity-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .box { background: white; padding: 30px; border-radius: 12px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .box h2 { margin-top: 0; color: #333; }
        .box input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 1rem; box-sizing: border-box; outline: none; }
        .box button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Layout */
        header { background: var(--primary-color); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-shrink: 0; }
        header h1 { margin: 0; font-size: 1.1rem; }
        .user-tag { font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .tabs-container { background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; flex-shrink: 0; }
        .tabs { display: flex; background: #f0f0f0; border-radius: 50px; padding: 5px; max-width: 800px; margin: 0 auto; overflow-x: auto; white-space: nowrap; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; border-radius: 40px; cursor: pointer; font-weight: bold; color: #666; font-size: 0.95rem; min-width: 80px; display: inline-block; }
        .tab-btn.active { background: var(--primary-color); color: white; }
        .tab-btn-admin { display: none; color: #d32f2f; } 

        .container { padding: 15px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; display: none; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
        .container.active { display: block; animation: fadeIn 0.3s ease; }

        /* Grid */
        .mandala { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding-bottom: 20px; }
        .sub-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #fff; border: 1px solid #ccc; aspect-ratio: 1/1; }
        .sub-grid:nth-child(5) { border: 2px solid var(--primary-color); z-index: 5; position: relative; }
        .cell { border: 1px solid #eee; display: flex; align-items: center; justify-content: center; position: relative; background: #fff; overflow: hidden; }
        
        .grid-select { width: 100%; height: 100%; text-align: center; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; cursor: pointer; padding: 4px; box-sizing: border-box; word-break: break-all; }
        .core .grid-select { background: #f5f5f5; font-weight: bold; color: #444; }
        .master .grid-select { background: var(--primary-color); color: white; font-weight: bold; font-size: 0.95rem; }

        /* CRM Form & Select Enhancement */
        .crm-form { background: white; padding: 15px; border-radius: 8px; border-top: 4px solid var(--primary-color); margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        input, select { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; min-width: 120px; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        .search-group { flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 5px; }
        .search-input { border: 2px solid #ddd !important; background: #fff; }
        .search-input:focus { border-color: var(--primary-color) !important; outline: none; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center; }
        .modal { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        #loading { position: fixed; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: white; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; display: none; z-index: 20000; }

        .std-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; background: white; }
        .std-table th { background: #333; color: white; padding: 12px; text-align: left; }
        .std-table td { padding: 12px; border-bottom: 1px solid #eee; }

        @media (max-width: 768px) {
            .mandala { grid-template-columns: 1fr; }
            .sub-grid { aspect-ratio: auto; min-height: 150px; }
        }
    </style>
</head>
<body>

<script>
    const SUPABASE_URL = 'https://htlywcaudjfnneaoikgz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0bHl3Y2F1ZGpmbm5lYW9pa2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3MjExOTIsImV4cCI6MjA4NjI5NzE5Mn0.h5lO8qbOBaQD1vqNwyFmLAGjut6afZN4mDrgmPoxCUg';
</script>

<div id="loading">處理中...</div>

<div id="identity-overlay">
    <div class="box">
        <h2>雲貴人脈系統</h2>
        <p>請登入系統</p>
        <input type="text" id="loginName" placeholder="帳號 / 姓名">
        <input type="password" id="loginPwd" placeholder="密碼" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">登入</button>
    </div>
</div>

<header>
    <h1>雲貴人脈庫</h1>
    <span class="user-tag" id="displayUser" onclick="logout()">登出</span>
</header>

<div class="tabs-container">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('grid')">產業鏈 81 宮格</div>
        <div class="tab-btn" onclick="switchTab('matches')">🤝 資源媒合</div>
        <div class="tab-btn" onclick="switchTab('crm')">人脈變現表</div>
        <div class="tab-btn tab-btn-admin" id="adminTabBtn" onclick="switchTab('admin')">⚙️ 後台</div>
    </div>
</div>

<div id="grid-view" class="container active">
    <div class="mandala" id="mandala"></div>
</div>

<div id="matches-view" class="container">
    <div id="match-results"></div>
</div>

<div id="crm-view" class="container">
    <div class="crm-form">
        <div class="row">
            <input id="cName" placeholder="人脈姓名">
        </div>
        <div class="row" style="background:#f9f9f9; padding:12px; border-radius:8px; border:1px solid #eee;">
            <div class="search-group">
                <div style="font-size:0.8rem; color:#666;">🔍 搜尋細項 (或直接在下方選擇)</div>
                <input type="text" id="crmSearch" class="search-input" placeholder="輸入關鍵字篩選..." oninput="filterSelect('crm')">
                <select id="cIndustry">
                    <option value="" disabled selected>載入中...</option>
                </select>
            </div>
        </div>
        <div class="row">
            <select id="cTrust">
                <option value="A">A.極熟悉信任</option><option value="B">B.交情不錯</option><option value="C">C.不熟</option><option value="D">D.陌生</option>
            </select>
            <select id="cNeed">
                <option value="X">X-需求極高</option><option value="Y">Y-一般需求</option><option value="Z">Z-不了解</option>
            </select>
        </div>
        <button class="btn-main" onclick="addContact()">新增人脈資源</button>
    </div>
    <div style="overflow-x:auto"><table class="std-table"><thead><tr><th>策略</th><th>姓名/產業</th><th>操作</th></tr></thead><tbody id="contact-list"></tbody></table></div>
</div>

<div class="modal-overlay" id="gridEditModal">
    <div class="modal">
        <h3 style="margin-top:0;">✏️ 編輯產業宮格</h3>
        <div class="search-group">
            <div style="font-size:0.8rem; color:#666;">🔍 搜尋細項 (或直接在下方選擇)</div>
            <input type="text" id="gridSearch" class="search-input" placeholder="輸入關鍵字..." oninput="filterSelect('grid')">
            <select id="gridEditInd" style="width:100%; margin-top:8px;"></select>
        </div>
        <div style="display: flex; justify-content: flex-end; margin-top:20px; gap:10px;">
            <button onclick="closeGridEditModal()" style="padding:8px 15px;">取消</button>
            <button class="btn-main" onclick="saveGridEdit()" style="width:auto; padding:8px 25px;">確認儲存</button>
        </div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentMember = null;
    let gridData = {}; 
    let allIndustries = []; // [{name, category}]

    // --- 智能過濾與下拉選單生成 ---
    function filterSelect(type, selectedVal = "") {
        const inputId = type === 'grid' ? 'gridSearch' : 'crmSearch';
        const selectId = type === 'grid' ? 'gridEditInd' : 'cIndustry';
        const addNewValue = type === 'grid' ? 'ADD_NEW_GRID' : 'ADD_NEW_CRM';
        
        const keyword = document.getElementById(inputId).value.trim().toLowerCase();
        const selectEl = document.getElementById(selectId);
        
        // 過濾資料
        const filtered = allIndustries.filter(i => i.name.toLowerCase().includes(keyword));
        
        // 按分類分群 (例如: 建築規劃圈、商業服務圈...)
        const grouped = filtered.reduce((acc, obj) => {
            const key = obj.category || '未分類';
            if (!acc[key]) acc[key] = [];
            acc[key].push(obj.name);
            return acc;
        }, {});

        let html = `<option value="" disabled ${!selectedVal ? 'selected' : ''}>--- 請選擇產業細項 (${filtered.length}) ---</option>`;
        
        for (const [cat, items] of Object.entries(grouped)) {
            html += `<optgroup label="【${cat}】">`;
            items.forEach(item => {
                html += `<option value="${item}" ${item === selectedVal ? 'selected' : ''}>${item}</option>`;
            });
            html += `</optgroup>`;
        }
        
        // 快捷新增選項
        if (keyword) {
            html += `<option value="${addNewValue}" style="color:var(--primary-color); font-weight:bold;">➕ 新增「${keyword}」至資料庫...</option>`;
        }
        
        selectEl.innerHTML = html;
    }

    async function loadIndustries() {
        let { data } = await db.from('industries').select('category, name').order('category').order('name');
        allIndustries = data || [];
        // 初始化 CRM 視圖的下拉選單
        filterSelect('crm');
    }

    async function login() {
        const name = document.getElementById('loginName').value.trim();
        const pwd = document.getElementById('loginPwd').value.trim();
        document.getElementById('loading').style.display = 'block';
        let { data: member } = await db.from('members').select('*').eq('name', name).eq('password', pwd).single();
        document.getElementById('loading').style.display = 'none';
        if (!member) return alert("帳號或密碼錯誤");
        currentMember = member;
        document.getElementById('displayUser').innerText = member.name + " (登出)";
        document.getElementById('identity-overlay').style.display = 'none';
        if(member.role === 'admin') document.getElementById('adminTabBtn').style.display = 'inline-block';
        renderGridStructure();
        await loadIndustries();
        await loadGrid();
        await loadContacts();
    }

    // --- 宮格編輯邏輯 ---
    let currentEditingId = null;
    function openGridEditModal(id) {
        currentEditingId = id;
        const currentVal = gridData[id] || "";
        document.getElementById('gridSearch').value = ""; // 清空搜尋框
        filterSelect('grid', currentVal); // 生成下拉選單並預選
        document.getElementById('gridEditModal').style.display = 'flex';
    }

    async function saveGridEdit() {
        const select = document.getElementById('gridEditInd');
        let val = select.value;
        if (!val) return alert("請選擇細項");
        
        if (val === 'ADD_NEW_GRID') {
            const newName = document.getElementById('gridSearch').value;
            const cat = prompt(`「${newName}」屬於哪個圈子？\n1.建築規劃 2.商業服務 3.生活服務 (輸入數字)`, "1");
            const catMap = {"1":"建築規劃圈", "2":"商業服務圈", "3":"生活服務圈"};
            const finalCat = catMap[cat] || "未分類";
            await db.from('industries').insert({name: newName, category: finalCat});
            val = newName;
            await loadIndustries();
        }
        
        await saveCell(currentEditingId, val);
        document.getElementById('gridEditModal').style.display = 'none';
    }

    // --- 通用基礎函數 ---
    function renderGridStructure() {
        const el = document.getElementById('mandala');
        const map = { 0:0, 1:1, 2:2, 3:3, 5:5, 6:6, 7:7, 8:8 };
        for(let g=0; g<9; g++) {
            let sub = document.createElement('div'); sub.className='sub-grid';
            for(let c=0; c<9; c++) {
                let cell = document.createElement('div');
                let isM = (g===4 && c===4), isC = (c===4);
                cell.className = `cell ${isM?'master':''} ${isC?'core':''}`;
                let div = document.createElement('div'); div.className = 'grid-select';
                let id = `g${g}-c${c}`; div.dataset.id = id;
                if(!(g!==4 && c===4)) div.onclick = () => openGridEditModal(id);
                cell.appendChild(div); sub.appendChild(cell);
            }
            el.appendChild(sub);
        }
    }

    async function loadGrid() {
        const { data } = await db.from('user_grids').select('*').eq('member_id', currentMember.id);
        data?.forEach(item => {
            gridData[item.grid_index] = item.content;
            let el = document.querySelector(`[data-id="${item.grid_index}"]`);
            if(el) el.innerText = item.content;
        });
        syncGridVisuals();
    }

    function syncGridVisuals() {
        for(let i=0; i<9; i++) {
            if(i===4) continue;
            const map = { 0:0, 1:1, 2:2, 3:3, 5:5, 6:6, 7:7, 8:8 };
            let val = gridData[`g4-c${i}`] || '';
            let el = document.querySelector(`[data-id="g${map[i]}-c4"]`);
            if(el) el.innerText = val;
        }
    }

    async function saveCell(idx, val) {
        gridData[idx] = val;
        await db.from('user_grids').upsert({member_id: currentMember.id, grid_index: idx, content: val}, {onConflict: 'member_id, grid_index'});
        document.querySelector(`[data-id="${idx}"]`).innerText = val;
        loadGrid();
    }

    async function loadContacts() {
        const { data } = await db.from('user_contacts').select('*').eq('member_id', currentMember.id);
        const list = document.getElementById('contact-list');
        list.innerHTML = data?.map(c => `<tr><td>甜蜜區</td><td>${c.name}<br><small>${c.industry}</small></td><td><button onclick="delContact('${c.id}')">✕</button></td></tr>`).join('') || '';
    }

    async function addContact() {
        const name = document.getElementById('cName').value;
        const ind = document.getElementById('cIndustry').value;
        if(!name || !ind || ind === 'ADD_NEW_CRM') return alert("請填寫完整");
        await db.from('user_contacts').insert({member_id: currentMember.id, owner_name: currentMember.name, name, industry: ind, trust_level:'A', need_level:'X'});
        document.getElementById('cName').value = "";
        loadContacts();
    }

    async function delContact(id) { if(confirm("刪除？")) { await db.from('user_contacts').delete().eq('id', id); loadContacts(); } }

    function switchTab(t) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById(t + '-view').classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    }

    function logout() { location.reload(); }
    function closeGridEditModal() { document.getElementById('gridEditModal').style.display = 'none'; }
</script>
</body>
</html>
