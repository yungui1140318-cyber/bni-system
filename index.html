<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雲貴人脈系統 (Ver 20260422-秒輸入版)</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #cf2e2e; --bg-color: #f0f2f5; --text-color: #333; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg-color); height: 100vh; display: flex; flex-direction: column; color: var(--text-color); overflow: hidden; }

        /* Login Overlay */
        #identity-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: white; padding: 30px; border-radius: 12px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .box input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 1rem; box-sizing: border-box; outline: none; }
        .box button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        
        header { background: var(--primary-color); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        header h1 { margin: 0; font-size: 1.1rem; }
        .user-tag { font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px; cursor: pointer; }

        .tabs-container { background: #fff; padding: 10px; z-index: 10; flex-shrink: 0; border-bottom: 1px solid #eee; }
        .tabs { display: flex; background: #f0f0f0; border-radius: 50px; padding: 5px; max-width: 800px; margin: 0 auto; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; border-radius: 40px; cursor: pointer; font-weight: bold; color: #666; font-size: 0.95rem; min-width: 80px; }
        .tab-btn.active { background: var(--primary-color); color: white; }

        .container { padding: 15px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; display: none; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
        .container.active { display: block; }

        /* Grid UI */
        .mandala { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .sub-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #fff; border: 1px solid #ccc; aspect-ratio: 1/1; }
        .sub-grid:nth-child(5) { border: 2px solid var(--primary-color); }
        .cell { border: 1px solid #eee; display: flex; align-items: center; justify-content: center; position: relative; background: #fff; overflow: hidden; }
        .grid-select { width: 100%; height: 100%; text-align: center; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer; padding: 2px; word-break: break-all; line-height: 1.2; }
        .core .grid-select { background: #f5f5f5; font-weight: bold; }
        .master .grid-select { background: var(--primary-color); color: white; font-weight: bold; font-size: 0.9rem; }

        /* Search List UI */
        .search-results { max-height: 180px; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px; background: white; display: none; }
        .search-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.95rem; display: flex; justify-content: space-between; }
        .search-item:hover { background: #fff5f5; color: var(--primary-color); }
        .search-item small { color: #888; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; }
        .modal { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 350px; display: flex; flex-direction: column; }
        .modal select, .modal input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }

        #loading { position: fixed; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: white; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; display: none; z-index: 20001; }

        @media (max-width: 768px) {
            .mandala { grid-template-columns: 1fr; gap: 10px; }
            .sub-grid { aspect-ratio: auto; min-height: 150px; }
        }
    </style>
</head>
<body>

<script>
    const SUPABASE_URL = 'https://htlywcaudjfnneaoikgz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0bHl3Y2F1ZGpmbm5lYW9pa2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3MjExOTIsImV4cCI6MjA4NjI5NzE5Mn0.h5lO8qbOBaQD1vqNwyFmLAGjut6afZN4mDrgmPoxCUg';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentMember = null;
    let gridData = {}; 
    let allIndustries = []; 
    let industryMap = {};
    let currentEditingGridId = null;

    async function login() {
        const name = document.getElementById('loginName').value.trim();
        const pwd = document.getElementById('loginPwd').value.trim();
        document.getElementById('loading').style.display = 'block';
        let { data: member } = await db.from('members').select('*').eq('name', name).eq('password', pwd).single();
        
        if (!member) {
            document.getElementById('loading').style.display = 'none';
            return alert("登入失敗");
        }
        
        currentMember = member;
        document.getElementById('displayUser').innerText = `${member.name} (登出)`;
        document.getElementById('identity-overlay').style.display = 'none';
        
        renderGridStructure(); 
        await loadIndustries();
        await loadGrid(); // 關鍵：這裡會把資料填回去
        document.getElementById('loading').style.display = 'none';
    }

    function logout() { location.reload(); }

    async function loadIndustries() {
        let { data } = await db.from('industries').select('*').order('category');
        allIndustries = data || [];
        industryMap = {};
        allIndustries.forEach(item => {
            if (!industryMap[item.category]) industryMap[item.category] = [];
            industryMap[item.category].push(item.name);
        });
    }

    function renderGridStructure() {
        const el = document.getElementById('mandala');
        el.innerHTML = '';
        for(let g=0; g<9; g++) {
            let sub = document.createElement('div'); sub.className='sub-grid';
            for(let c=0; c<9; c++) {
                let cell = document.createElement('div');
                let isM = (g===4 && c===4), isC = (c===4);
                cell.className = `cell ${isM?'master':''} ${isC?'core':''}`;
                let div = document.createElement('div');
                div.className = 'grid-select';
                let id = `g${g}-c${c}`;
                div.id = `cell-${id}`;
                div.dataset.id = id;
                if(!(g!==4 && c===4)) div.onclick = () => openGridEditModal(id);
                cell.appendChild(div);
                sub.appendChild(cell);
            }
            el.appendChild(sub);
        }
    }

    async function loadGrid() {
        const { data } = await db.from('user_grids').select('*').eq('member_id', currentMember.id);
        if (data) {
            data.forEach(item => {
                gridData[item.grid_index] = item.content;
                let el = document.getElementById(`cell-${item.grid_index}`);
                if(el) el.innerText = item.content;
            });
        }
    }

    function openGridEditModal(id) {
        currentEditingGridId = id;
        document.getElementById('gridSearchInput').value = '';
        document.getElementById('searchResults').style.display = 'none';
        
        let catSel = document.getElementById('gridEditCat');
        catSel.innerHTML = '<option value="" disabled selected>1. 選擇戰略引薦圈</option>';
        Object.keys(industryMap).forEach(cat => {
            catSel.innerHTML += `<option value="${cat}">${cat}</option>`;
        });
        
        document.getElementById('gridEditInd').innerHTML = '<option value="" disabled selected>2. 選擇細項</option>';
        document.getElementById('gridEditModal').style.display = 'flex';
    }

    function filterIndustries(val) {
        const resDiv = document.getElementById('searchResults');
        if (!val.trim()) { resDiv.style.display = 'none'; return; }
        const matches = allIndustries.filter(i => i.name.includes(val));
        if (matches.length > 0) {
            resDiv.innerHTML = matches.map(i => `<div class="search-item" onclick="quickSave('${i.name}')">${i.name} <small>${i.category}</small></div>`).join('');
            resDiv.style.display = 'block';
        } else {
            resDiv.style.display = 'none';
        }
    }

    async function quickSave(name) {
        await saveCell(currentEditingGridId, name);
        closeGridEditModal();
    }

    function onGridEditCatChange() {
        let cat = document.getElementById('gridEditCat').value;
        let indSel = document.getElementById('gridEditInd');
        indSel.innerHTML = '<option value="" disabled selected>2. 選擇細項</option>';
        if(industryMap[cat]) {
            industryMap[cat].forEach(name => {
                indSel.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }
    }

    async function onGridEditIndSelect() {
        let val = document.getElementById('gridEditInd').value;
        if(val) {
            await saveCell(currentEditingGridId, val);
            closeGridEditModal();
        }
    }

    async function saveCell(index, content) {
        document.getElementById('loading').style.display = 'block';
        gridData[index] = content;
        
        // 儲存到資料庫
        await db.from('user_grids').upsert({ 
            member_id: currentMember.id, 
            grid_index: index, 
            content: content 
        }, { onConflict: 'member_id, grid_index' });

        // 更新畫面
        let el = document.getElementById(`cell-${index}`);
        if(el) el.innerText = content;

        // 同步邏輯 (中宮格連動大宮格中心)
        if(index.startsWith('g4-')) {
            let col = parseInt(index.split('c')[1]);
            const map = { 0:0, 1:1, 2:2, 3:3, 5:5, 6:6, 7:7, 8:8 };
            if (col !== 4) {
                let targetId = `g${map[col]}-c4`;
                await db.from('user_grids').upsert({ member_id: currentMember.id, grid_index: targetId, content: content }, { onConflict: 'member_id, grid_index' });
                let targetEl = document.getElementById(`cell-${targetId}`);
                if(targetEl) targetEl.innerText = content;
            }
        }
        document.getElementById('loading').style.display = 'none';
    }

    function closeGridEditModal() { document.getElementById('gridEditModal').style.display = 'none'; }
    function switchTab(t) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t+'-view').classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

<header>
    <h1>雲貴人脈庫</h1>
    <span class="user-tag" id="displayUser" onclick="logout()">登入中</span>
</header>

<div class="tabs-container">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('grid')">81 宮格</div>
        <div class="tab-btn" onclick="switchTab('crm')">人脈表</div>
    </div>
</div>

<div id="grid-view" class="container active">
    <div class="mandala" id="mandala"></div>
</div>

<div id="crm-view" class="container">
    <p style="text-align:center; color:#999;">人脈清單載入中...</p>
</div>

<div class="modal-overlay" id="gridEditModal">
    <div class="modal">
        <h3 style="margin:0 0 15px 0;">快速填寫產業</h3>
        <input type="text" id="gridSearchInput" placeholder="🔍 輸入關鍵字搜尋..." oninput="filterIndustries(this.value)">
        <div id="searchResults" class="search-results"></div>
        <div style="text-align:center; margin:10px 0; color:#ccc; font-size:0.8rem;">— 或從選單挑選 —</div>
        <select id="gridEditCat" onchange="onGridEditCatChange()"></select>
        <select id="gridEditInd" onchange="onGridEditIndSelect()"></select>
        <button onclick="closeGridEditModal()" style="margin-top:10px; padding:10px; background:#f0f0f0; border:none; border-radius:8px; cursor:pointer;">關閉離開</button>
    </div>
</div>

</body>
</html>
